version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: daily_problem_tracker_db
    environment:
      POSTGRES_DB: daily_problem_tracker
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
