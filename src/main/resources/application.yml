spring:
  application:
    name: daily-problem-tracker-service
  sql:
    init:
      mode: always
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require}
    username: ${DATABASE_USERNAME:postgres.qqxeaqtjykfdujxgocdr}
    password: ${DATABASE_PASSWORD:sup5r21s5@P1sswor4}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
